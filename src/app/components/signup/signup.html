<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh; margin-top: 2rem; margin-bottom: 2rem;">

  <div class="card shadow-lg border-0" style="width: 100%; max-width: 500px;">
    <div class="card-body p-5">

      <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">Create an Account</h2>
        <p class="text-muted">Start taking control of your budget today</p>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger py-2 text-center small fw-bold">
          {{ errorMessage }}
        </div>
      }

      <form #signupForm="ngForm" (ngSubmit)="onSubmit()">

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-bold small">First Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" required name="firstName" [(ngModel)]="newUser.firstName">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold small">Last Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" required name="lastName" [(ngModel)]="newUser.lastName">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold small">Username <span class="text-danger">*</span></label>
          <input type="text" class="form-control" placeholder="budgetMaster99" required name="username" [(ngModel)]="newUser.username">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold small">Email address <span class="text-danger">*</span></label>
          <input type="email" class="form-control" placeholder="name@example.com" required name="email" [(ngModel)]="newUser.email">
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold small">Password <span class="text-danger">*</span></label>
          <input type="password" class="form-control" placeholder="••••••••" required name="password" [(ngModel)]="newUser.password">
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" [disabled]="signupForm.invalid || isLoading">
          {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
        </button>

      </form>

      <hr class="my-4">

      <div class="text-center">
        <p class="mb-0 text-muted">
          Already have an account?
          <a routerLink="" class="text-decoration-none fw-bold">Log in here</a>
        </p>
      </div>

    </div>
  </div>

</div>
