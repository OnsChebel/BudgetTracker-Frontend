<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Financial Overview</h2>
  </div>

  <div class="row g-4 mb-4">

    <div class="col-md-3">
      <div class="card shadow-sm border-0 border-start border-primary border-4 h-100">
        <div class="card-body">
          <p class="text-muted text-uppercase small fw-bold mb-1">Total Net Worth</p>
          <h3 class="mb-0 fw-bold text-primary">{{ totalBalance | currency }}</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0 border-start border-success border-4 h-100">
        <div class="card-body">
          <p class="text-muted text-uppercase small fw-bold mb-1">Total Income</p>
          <h3 class="mb-0 fw-bold text-success">{{ totalIncome | currency }}</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0 border-start border-danger border-4 h-100">
        <div class="card-body">
          <p class="text-muted text-uppercase small fw-bold mb-1">Total Expenses</p>
          <h3 class="mb-0 fw-bold text-danger">{{ totalExpenses | currency }}</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0 border-start border-4 h-100"
           [class.border-success]="netCashFlow >= 0"
           [class.border-danger]="netCashFlow < 0">
        <div class="card-body">
          <p class="text-muted text-uppercase small fw-bold mb-1">Net Cash Flow</p>
          <h3 class="mb-0 fw-bold"
              [class.text-success]="netCashFlow >= 0"
              [class.text-danger]="netCashFlow < 0">
            {{ netCashFlow | currency }}
          </h3>
        </div>
      </div>
    </div>

  </div>
</div>
