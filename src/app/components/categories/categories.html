<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Categories</h2>
    <button class="btn btn-primary" (click)="openAddForm()">+ Add Category</button>
  </div>

  @if (showForm) {
    <div class="card mb-4 shadow-sm">
      <div class="card-header bg-light">
        <h5 class="mb-0">{{ isEditMode ? 'Edit Category' : 'New Category' }}</h5>
      </div>
      <div class="card-body">
        <form (ngSubmit)="saveCategory()">
          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label">Category Name</label>
              <input type="text" class="form-control" name="name" [(ngModel)]="currentCategory.name" required placeholder="e.g. Groceries">
            </div>

            <div class="col-md-6">
              <label class="form-label">Icon (Emoji or Text)</label>
              <input type="text" class="form-control" name="icon" [(ngModel)]="currentCategory.icon" placeholder="e.g. 🛒">
            </div>

          </div>

          <div class="mt-3 text-end">
            <button type="button" class="btn btn-secondary me-2" (click)="closeForm()">Cancel</button>
            <button type="submit" class="btn btn-success">Save</button>
          </div>
        </form>
      </div>
    </div>
  }

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
        <tr>
          <th>Icon</th>
          <th>Name</th>
          <th class="text-end pe-4">Actions</th>
        </tr>
        </thead>
        <tbody>
          @for (cat of categories; track cat.id) {
            <tr>
              <td class="fs-5">{{ cat.icon }}</td>

              <td class="fw-semibold align-middle">{{ cat.name }}</td>

              <td class="text-end pe-3 align-middle">
                <button class="btn btn-sm btn-outline-primary me-2" (click)="openEditForm(cat)">Edit</button>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteCategory(cat.id)">Delete</button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="3" class="text-center text-muted py-4">No categories found. Click "+ Add Category" to create one!</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
